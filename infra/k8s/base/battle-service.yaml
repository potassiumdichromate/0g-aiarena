apiVersion: apps/v1
kind: Deployment
metadata:
  name: battle-service
  namespace: ai-arena
  labels:
    app: battle-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: battle-service
  template:
    metadata:
      labels:
        app: battle-service
    spec:
      containers:
        - name: battle-service
          image: ai-arena/battle-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-arena-secrets
                  key: database-url
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-arena-secrets
                  key: nats-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-arena-secrets
                  key: redis-url
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: battle-service
  namespace: ai-arena
spec:
  selector:
    app: battle-service
  ports:
    - port: 3004
      targetPort: 3004
