global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

image:
  pullPolicy: IfNotPresent
  tag: latest

replicaCount:
  identityService: 2
  agentService: 2
  battleService: 3
  matchmakingService: 2
  inferenceService: 4
  memoryService: 2
  leaderboardService: 2
  telemetryService: 3

resources:
  identityService:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  inferenceService:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 2Gi }
  battleService:
    requests: { cpu: 200m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }
  default:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

autoscaling:
  enabled: true
  inferenceService:
    minReplicas: 4
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
  battleService:
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.aiarena.gg
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ai-arena-tls
      hosts:
        - api.aiarena.gg

serviceAccount:
  create: true
  name: ai-arena-sa
  annotations: {}

secrets:
  create: false
  name: ai-arena-secrets

config:
  nodeEnv: production
  logLevel: info

postgresql:
  enabled: false
  external:
    host: ""
    port: 5432
    database: aiarena

redis:
  enabled: false
  external:
    host: ""
    port: 6379

nats:
  enabled: false
  external:
    url: ""

qdrant:
  enabled: false
  external:
    url: ""
