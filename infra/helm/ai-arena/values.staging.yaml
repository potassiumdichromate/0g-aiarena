global:
  imageRegistry: gcr.io/ai-arena-staging

replicaCount:
  identityService: 1
  agentService: 1
  battleService: 1
  matchmakingService: 1
  inferenceService: 2
  memoryService: 1
  leaderboardService: 1
  telemetryService: 1

autoscaling:
  enabled: false

ingress:
  hosts:
    - host: api.staging.aiarena.gg
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ai-arena-staging-tls
      hosts:
        - api.staging.aiarena.gg

config:
  nodeEnv: staging
  logLevel: debug
