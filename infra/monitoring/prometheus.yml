global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'ai-arena'

# ── Alerting ──────────────────────────────────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Scrape configs ─────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Infrastructure
  - job_name: redis
    static_configs:
      - targets: ['redis:6379']

  # AI Arena microservices — each exposes GET /metrics (OTLP auto-instrumentation)
  - job_name: api-gateway
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics

  - job_name: identity-service
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: /metrics

  - job_name: agent-service
    static_configs:
      - targets: ['host.docker.internal:8002']
    metrics_path: /metrics

  - job_name: financial-service
