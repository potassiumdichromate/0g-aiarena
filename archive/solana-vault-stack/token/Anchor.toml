[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
arena_reserve = "5BzJy7xd1MuUfg5aRGohUgZTwCP4VgQ7YnrLmavaN2BG"

[programs.mainnet]
arena_reserve = "5BzJy7xd1MuUfg5aRGohUgZTwCP4VgQ7YnrLmavaN2BG"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = ["programs/arena-reserve"]

[test]
startup_wait = 5000

[test.validator]
url = "https://api.devnet.solana.com"
