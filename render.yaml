      - key: ARENA_TOKEN_ADDRESS
        sync: false
      - key: ARENA_TREASURY_ADDRESS
        sync: false
      - key: ARENA_REWARD_DISTRIBUTOR_ADDRESS
        sync: false
      - key: ARENA_ESCROW_ADDRESS
        sync: false
      - key: ARENA_TOURNAMENT_ADDRESS
        sync: false
      - key: ARENA_RELAYER_PRIVATE_KEY
        sync: false
      - key: ARENA_CHAIN_SERVICE_URL
        value: https://aiarena-arena-chain.onrender.com
      - key: INTERNAL_SERVICE_SECRET
