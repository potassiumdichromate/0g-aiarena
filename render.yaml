# AI Arena — Render Blueprint
# Render Dashboard → New → Blueprint → connect repo → fill in secret values in the wizard
#
# After deploy: run DB migration once via Shell on aiarena-agent:
#   npx prisma migrate deploy

databases:
  - name: aiarena-db
    databaseName: aiarena
    user: aiarena_user
    plan: free
    region: oregon

services:
  # ── NATS (private — internal messaging bus) ───────────────────────────────────
  - type: pserv
    name: aiarena-nats
    env: docker
    plan: starter
    region: oregon
    dockerfilePath: ./services/nats/Dockerfile
    dockerContext: ./services/nats
    envVars:
      - key: NATS_USER
        value: arena
      - key: NATS_PASSWORD
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: aiarena-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Identity Service ──────────────────────────────────────────────────────────
  - type: web
    name: aiarena-identity
    env: node
    plan: starter
    region: oregon
    rootDir: services/identity-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/identity-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8001"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aiarena-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: CUSTODIAL_WALLET_ENCRYPTION_KEY
        sync: false
      - key: NATS_URL
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com

  # ── Agent Service ─────────────────────────────────────────────────────────────
  - type: web
    name: aiarena-agent
    env: node
    plan: starter
    region: oregon
    rootDir: services/agent-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/agent-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8002"
      - key: NODE_ENV
        value: production
      - key: ENABLE_AVATAR_GEN
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NATS_URL
        sync: false
      - key: ZEROG_COMPUTE_BASE_URL
        value: https://router-api.0g.ai/v1
      - key: ZEROG_COMPUTE_API_KEY
        sync: false
      - key: ZEROG_MODEL_CHAT
        value: zai-org/GLM-5.1-FP8
      - key: ZEROG_MODEL_IMAGE
        value: z-image
      - key: ZEROG_NETWORK
        value: mainnet
      - key: ZEROG_STORAGE_PRIVATE_KEY
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: FINANCIAL_SERVICE_URL
        value: https://aiarena-financial.onrender.com
      - key: INFT_SERVICE_URL
        value: https://aiarena-inft.onrender.com
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      # OKX Agent Marketplace A2MCP bridge — checked by okxServiceMiddleware,
      # issued/rotated independently of INTERNAL_SERVICE_SECRET. See docs/okx/.
      - key: OKX_SERVICE_KEY
        sync: false

  # ── OKX Payment Proxy (x402 v2 gate in front of /okx/create-agent) ────────────
  # Pure ESM, no Prisma/db-client dependency — standalone build.
  # Protocol: x402 v2, eip155:196 (X Layer), EIP-3009 transferWithAuthorization.
  - type: web
    name: aiarena-okx-payment-proxy
    env: node
    plan: starter
    region: oregon
    rootDir: services/okx-payment-proxy
    buildCommand: cd ../.. && pnpm install --ignore-scripts && node_modules/.bin/turbo run build --filter=@ai-arena/okx-payment-proxy
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8090"
      - key: NODE_ENV
        value: production
      - key: OKX_PROXY_UPSTREAM_URL
        value: https://aiarena-agent.onrender.com/okx/create-agent
      # Must match aiarena-agent's OKX_SERVICE_KEY above exactly.
      - key: OKX_SERVICE_KEY
        sync: false
      # x402 v2 payment terms — defaults match OKX's specification for ASP #2170.
      # OKX's facilitator executes transferWithAuthorization on-chain (gasless for us).
      # Override here if OKX changes payTo or the USDT contract address.
      - key: X402_ASSET
        value: "0x779ded0c9e1022225f8e0630b35a9b54be713736"
      - key: X402_PAY_TO
        value: "0xaa1860e22184852ae8b1890169b732da23459990"
      - key: X402_AMOUNT
        value: "100000"

