# AI Arena — Render Blueprint
# Render Dashboard → New → Blueprint → connect repo → fill in secret values in the wizard
#
# After deploy: run DB migration once via Shell on aiarena-agent:
#   npx prisma migrate deploy

databases:
  - name: aiarena-db
    databaseName: aiarena
    user: aiarena_user
    plan: free
    region: oregon

services:
  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: aiarena-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Identity Service ──────────────────────────────────────────────────────────
  - type: web
    name: aiarena-identity
    env: node
    plan: starter
    region: oregon
    rootDir: services/identity-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/identity-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8001"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aiarena-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: CUSTODIAL_WALLET_ENCRYPTION_KEY
        sync: false
      - key: NATS_URL
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com

  # ── Agent Service ─────────────────────────────────────────────────────────────
  - type: web
    name: aiarena-agent
    env: node
    plan: starter
    region: oregon
    rootDir: services/agent-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/agent-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8002"
      - key: NODE_ENV
        value: production
      - key: ENABLE_AVATAR_GEN
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NATS_URL
        sync: false
      - key: ZEROG_COMPUTE_BASE_URL
        value: https://router-api.0g.ai/v1
      - key: ZEROG_COMPUTE_API_KEY
        sync: false
      - key: ZEROG_MODEL_CHAT
        value: zai-org/GLM-5.1-FP8
      - key: ZEROG_MODEL_IMAGE
        value: z-image
      - key: ZEROG_NETWORK
        value: mainnet
      - key: ZEROG_STORAGE_PRIVATE_KEY
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com

  # ── Battle Service ────────────────────────────────────────────────────────────
  - type: web
    name: aiarena-battle
    env: node
    plan: starter
    region: oregon
    rootDir: services/battle-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/battle-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8003"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NATS_URL
        sync: false
      - key: ZEROG_COMPUTE_BASE_URL
        value: https://router-api.0g.ai/v1
      - key: ZEROG_COMPUTE_API_KEY
        sync: false
      - key: ZEROG_STORAGE_PRIVATE_KEY
        sync: false
      - key: ZEROG_NETWORK
        value: mainnet
      - key: FINANCIAL_SERVICE_URL
        value: https://aiarena-financial.onrender.com

  # ── Matchmaking Service ───────────────────────────────────────────────────────
  - type: web
    name: aiarena-matchmaking
    env: node
    plan: starter
    region: oregon
    rootDir: services/matchmaking-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/matchmaking-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8004"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aiarena-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NATS_URL
        sync: false
      - key: FINANCIAL_SERVICE_URL
        value: https://aiarena-financial.onrender.com
      - key: WAGER_STAKE_AMOUNT
        value: "5"

  # ── Financial Service ─────────────────────────────────────────────────────────
  - type: web
    name: aiarena-financial
    env: node
    plan: starter
    region: oregon
    rootDir: services/financial-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/financial-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8005"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NATS_URL
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: AGENT_WALLET_PROGRAM_ID
        sync: false
      - key: ESCROW_VAULT_PROGRAM_ID
        sync: false

  # ── Token Service ─────────────────────────────────────────────────────────────
  - type: web
    name: aiarena-token
    env: node
    plan: starter
    region: oregon
    rootDir: services/token-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/token-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8006"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NATS_URL
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: ARENA_TOKEN_PROGRAM_ID
        sync: false
      - key: ARENA_RESERVE_PROGRAM_ID
        sync: false

  # ── Leaderboard Service ───────────────────────────────────────────────────────
  - type: web
    name: aiarena-leaderboard
    env: node
    plan: starter
    region: oregon
    rootDir: services/leaderboard-service
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/leaderboard-service...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8008"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiarena-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NATS_URL
        sync: false

  # ── API Gateway (public entry point) ─────────────────────────────────────────
  - type: web
    name: aiarena-gateway
    env: node
    plan: starter
    region: oregon
    rootDir: services/api-gateway
    buildCommand: cd ../.. && pnpm install --ignore-scripts && packages/db-client/node_modules/.bin/prisma generate --schema=packages/db-client/prisma/schema.prisma && node_modules/.bin/turbo run build --filter=@ai-arena/api-gateway...
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          name: aiarena-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://kult-browser-rust-l2lwg.ondigitalocean.app,http://localhost:3000,http://localhost:8080"
      - key: IDENTITY_SERVICE_URL
        value: https://aiarena-identity.onrender.com
      - key: AGENT_SERVICE_URL
        value: https://aiarena-agent.onrender.com
      - key: BATTLE_SERVICE_URL
        value: https://aiarena-battle.onrender.com
      - key: MATCHMAKING_SERVICE_URL
        value: https://aiarena-matchmaking.onrender.com
      - key: FINANCIAL_SERVICE_URL
        value: https://aiarena-financial.onrender.com
      - key: TOKEN_SERVICE_URL
        value: https://aiarena-token.onrender.com
      - key: LEADERBOARD_SERVICE_URL
        value: https://aiarena-leaderboard.onrender.com
