version: '3.9'

networks:
  ai-arena-net:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  qdrant_data:
  nats_data:
  prometheus_data:
  grafana_data:

services:
  postgres:
    image: postgres:16
    container_name: ai-arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_arena
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_arena
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ai-arena-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_arena"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: ai-arena-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: ai_arena_analytics
      CLICKHOUSE_USER: ai_arena
      CLICKHOUSE_PASSWORD: password
    networks:
      - ai-arena-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-arena-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-arena-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: ai-arena-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    networks:
      - ai-arena-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-arena-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-arena-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ai-arena-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ai-arena-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.3
    container_name: ai-arena-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/ai-arena-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - ai-arena-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ai-arena-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (services send traces here)
      - "4318:4318"     # OTLP HTTP
    networks:
      - ai-arena-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── $ARENA Token Service ───────────────────────────────────────────────────
  token-service:
    build:
      context: ./services/token-service
      dockerfile: ../../Dockerfile.service
    container_name: ai-arena-token-service
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      PORT: 8050
      NODE_ENV: production
      DATABASE_URL:              ${DATABASE_URL}
      REDIS_URL:                 ${REDIS_URL}
      NATS_URL:                  ${NATS_URL}
      SOLANA_RPC_URL:            ${SOLANA_RPC_URL}
      ARENA_RESERVE_PROGRAM_ID:  ${ARENA_RESERVE_PROGRAM_ID}
      ARENA_TOKEN_MINT:          ${ARENA_TOKEN_MINT}
      USDC_MINT:                 ${USDC_MINT}
      USDT_MINT:                 ${USDT_MINT}
      RELAYER_SOLANA_PRIVATE_KEY: ${RELAYER_SOLANA_PRIVATE_KEY}
      BASE_RPC_URL:              ${BASE_RPC_URL}
      BASE_DEPOSIT_VAULT_ADDRESS: ${BASE_DEPOSIT_VAULT_ADDRESS}
      ZEROG_EVM_RPC:             ${ZEROG_EVM_RPC}
      ZEROG_DEPOSIT_VAULT_ADDRESS: ${ZEROG_DEPOSIT_VAULT_ADDRESS}
      ALLOWED_ORIGINS:           ${ALLOWED_ORIGINS}
    depends_on:
      - postgres
      - redis
    networks:
      - ai-arena-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8050/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # Bridge listener (separate container — must stay alive indefinitely)
  bridge-listener:
    build:
      context: ./services/token-service
      dockerfile: ../../Dockerfile.service
    container_name: ai-arena-bridge-listener
    restart: always
    command: ["node", "dist/workers/bridge-listener.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL:              ${DATABASE_URL}
      REDIS_URL:                 ${REDIS_URL}
      NATS_URL:                  ${NATS_URL}
      SOLANA_RPC_URL:            ${SOLANA_RPC_URL}
      ARENA_RESERVE_PROGRAM_ID:  ${ARENA_RESERVE_PROGRAM_ID}
      ARENA_TOKEN_MINT:          ${ARENA_TOKEN_MINT}
      RELAYER_SOLANA_PRIVATE_KEY: ${RELAYER_SOLANA_PRIVATE_KEY}
      BASE_RPC_URL:              ${BASE_RPC_URL}
      BASE_DEPOSIT_VAULT_ADDRESS: ${BASE_DEPOSIT_VAULT_ADDRESS}
      ZEROG_EVM_RPC:             ${ZEROG_EVM_RPC}
      ZEROG_DEPOSIT_VAULT_ADDRESS: ${ZEROG_DEPOSIT_VAULT_ADDRESS}
    depends_on:
      - postgres
      - redis
    networks:
      - ai-arena-net
